name: Build

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  # Cancel in-progress runs for the same branch/PR when a new commit lands.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so `git describe --tags --exact-match HEAD` in build.gradle.kts
          # can see tags and produce a real version string (not 0.0.1-SNAPSHOT) on release tags.
          fetch-depth: 0
          # Ensure tags are actually fetched (shallow checkouts drop them by default).
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Build all modules
        run: ./gradlew --no-daemon :common:test :neoforge:build :fabric:build dist

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: mod-jars-${{ github.sha }}
          path: build/dist/*.jar
          retention-days: 14
          if-no-files-found: error
